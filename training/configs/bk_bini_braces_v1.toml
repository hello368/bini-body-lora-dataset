[experiment]
name = "bk_bini_braces_v1"
trainer = "kohya_or_ai_toolkit"
trigger_word = "bk_bini_braces"
compatible_body_trigger = "bk_bini_body"
dataset = "datasets/bini_body_selected"
filtered_dataset_rule = "Use only images where bilateral orthopedic leg braces and/or forearm crutches are clearly visible."
output_dir = "training/outputs/bk_bini_braces_v1"

[training]
rank = 16
alternate_rank = 32
alpha = 16
max_train_steps = 1800
recommended_step_range = "1200-1800"
learning_rate = 0.00008
train_text_encoder = false
resolution = 1024
save_every_n_steps = 250
mixed_precision = "bf16"
save_precision = "bf16"
optimizer = "AdamW8bit"
network_module = "networks.lora_flux"

[rules]
positive_trigger = "bk_bini_braces"
excluded_dirs = ["needs_fix", "rejected", "old candidates", "datasets/bini_body_needs_fix", "datasets/bini_body_rejected"]
caption_policy = "Caption braces/crutches only when visible. Do not use bk_bini_teen as the main trigger."

