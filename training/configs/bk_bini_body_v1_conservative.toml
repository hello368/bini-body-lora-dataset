[experiment]
name = "bk_bini_body_v1_conservative"
trainer = "kohya_or_ai_toolkit"
trigger_word = "bk_bini_body"
base_face_trigger = "bk_bini_teen"
dataset = "datasets/bini_body_selected"
output_dir = "training/outputs/bk_bini_body_v1_conservative"

[training]
rank = 16
alpha = 16
max_train_steps = 1600
recommended_step_range = "1200-1600"
learning_rate = 0.00008
learning_rate_range = "5e-5 to 1e-4"
train_text_encoder = false
resolution = 1024
save_every_n_steps = 250
mixed_precision = "bf16"
save_precision = "bf16"
optimizer = "AdamW8bit"
network_module = "networks.lora_flux"

[rules]
positive_trigger = "bk_bini_body"
excluded_dirs = ["needs_fix", "rejected", "old candidates", "datasets/bini_body_needs_fix", "datasets/bini_body_rejected"]
caption_policy = "Natural captions; do not use bk_bini_teen as the main body trigger."

